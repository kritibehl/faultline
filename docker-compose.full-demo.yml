services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: faultline
      POSTGRES_PASSWORD: faultline
      POSTGRES_DB: faultline_demo
    ports:
      - "55432:5432"

  metrics:
    build: .
    command: uvicorn metrics.prometheus_server:app --host 0.0.0.0 --port 9000
    ports:
      - "9000:9000"
