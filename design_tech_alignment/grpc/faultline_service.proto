syntax = "proto3";

package faultline.v1;

service JobExecutionService {
  rpc SubmitJob(SubmitJobRequest) returns (SubmitJobResponse);
  rpc ClaimJob(ClaimJobRequest) returns (ClaimJobResponse);
  rpc CommitJob(CommitJobRequest) returns (CommitJobResponse);
  rpc GetJobHealth(GetJobHealthRequest) returns (GetJobHealthResponse);
}

message SubmitJobRequest {
  string idempotency_key = 1;
  string payload_json = 2;
}

message SubmitJobResponse {
  string job_id = 1;
  bool duplicate_prevented = 2;
}

message ClaimJobRequest {
  string worker_id = 1;
}

message ClaimJobResponse {
  string job_id = 1;
  int64 fencing_token = 2;
  string lease_expires_at = 3;
}

message CommitJobRequest {
  string job_id = 1;
  string worker_id = 2;
  int64 submitted_fencing_token = 3;
  string result_json = 4;
}

message CommitJobResponse {
  bool accepted = 1;
  bool stale_worker_rejected = 2;
  string decision_reason = 3;
}

message GetJobHealthRequest {
  string job_id = 1;
}

message GetJobHealthResponse {
  string job_id = 1;
  string state = 2;
  string lease_owner = 3;
  int64 fencing_token = 4;
  int32 retry_count = 5;
  bool duplicate_risk = 6;
}
