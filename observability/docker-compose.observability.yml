services:
  prometheus:
    image: prom/prometheus:latest
    container_name: faultline-prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: faultline-grafana
    ports:
      - "3000:3000"

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: faultline-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  loki:
    image: grafana/loki:latest
    container_name: faultline-loki
    ports:
      - "3100:3100"
