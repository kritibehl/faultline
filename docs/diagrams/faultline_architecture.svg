<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <rect width="1200" height="700" fill="#f8fafc"/>

  <text x="50" y="60" font-family="Arial" font-size="34" font-weight="700" fill="#111827">Faultline Architecture</text>
  <text x="50" y="92" font-family="Arial" font-size="17" fill="#4b5563">Correctness-under-failure distributed execution with PostgreSQL fencing-token validation</text>

  <rect x="60" y="150" width="210" height="90" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="100" y="190" font-family="Arial" font-size="20" font-weight="700" fill="#111827">Producer API</text>
  <text x="92" y="218" font-family="Arial" font-size="14" fill="#4b5563">enqueue jobs</text>

  <rect x="360" y="140" width="240" height="110" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="405" y="180" font-family="Arial" font-size="20" font-weight="700" fill="#111827">Job Queue</text>
  <text x="392" y="210" font-family="Arial" font-size="14" fill="#4b5563">state, lease_owner</text>
  <text x="392" y="232" font-family="Arial" font-size="14" fill="#4b5563">lease_expires_at</text>

  <rect x="720" y="90" width="190" height="90" rx="18" fill="#eff6ff" stroke="#60a5fa"/>
  <text x="760" y="130" font-family="Arial" font-size="20" font-weight="700" fill="#1d4ed8">Worker A</text>
  <text x="753" y="158" font-family="Arial" font-size="14" fill="#1e40af">token=1, stalls</text>

  <rect x="720" y="220" width="190" height="90" rx="18" fill="#ecfdf5" stroke="#34d399"/>
  <text x="760" y="260" font-family="Arial" font-size="20" font-weight="700" fill="#047857">Worker B</text>
  <text x="748" y="288" font-family="Arial" font-size="14" fill="#065f46">takes over, token=2</text>

  <rect x="390" y="380" width="330" height="150" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="440" y="425" font-family="Arial" font-size="22" font-weight="700" fill="#111827">PostgreSQL Boundary</text>
  <text x="430" y="460" font-family="Arial" font-size="15" fill="#374151">monotonic fencing_token</text>
  <text x="430" y="485" font-family="Arial" font-size="15" fill="#374151">commit-log uniqueness</text>
  <text x="430" y="510" font-family="Arial" font-size="15" fill="#374151">reject stale writes</text>

  <rect x="820" y="410" width="260" height="100" rx="18" fill="#fff7ed" stroke="#fb923c"/>
  <text x="865" y="450" font-family="Arial" font-size="20" font-weight="700" fill="#9a3412">Inspector</text>
  <text x="845" y="478" font-family="Arial" font-size="14" fill="#9a3412">/health /metrics /trace/export</text>

  <rect x="60" y="450" width="230" height="100" rx="18" fill="#fef2f2" stroke="#f87171"/>
  <text x="95" y="490" font-family="Arial" font-size="20" font-weight="700" fill="#991b1b">Stale Commit</text>
  <text x="88" y="520" font-family="Arial" font-size="14" fill="#991b1b">worker-a token=1 rejected</text>

  <line x1="270" y1="195" x2="360" y2="195" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="600" y1="180" x2="720" y2="135" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="600" y1="220" x2="720" y2="265" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="815" y1="310" x2="650" y2="380" stroke="#16a34a" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="720" y1="135" x2="270" y2="455" stroke="#dc2626" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
  <line x1="720" y1="455" x2="820" y2="460" stroke="#f97316" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="768" y="360" font-family="Arial" font-size="14" fill="#047857">valid token commits</text>
  <text x="325" y="335" font-family="Arial" font-size="14" fill="#991b1b">late stale write rejected</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
