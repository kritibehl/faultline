<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420">
  <rect width="1400" height="420" fill="#f8fafc"/>

  <text x="40" y="55" font-family="Arial" font-size="32" font-weight="700" fill="#111827">
    Faultline Worker Lifecycle
  </text>

  <text x="40" y="90" font-family="Arial" font-size="17" fill="#475569">
    Distributed execution lifecycle with lease takeover and stale-worker rejection
  </text>

  <rect x="50" y="170" width="150" height="90" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="90" y="220" font-family="Arial" font-size="22" font-weight="700" fill="#111827">Queued</text>

  <rect x="260" y="170" width="170" height="90" rx="18" fill="#eff6ff" stroke="#60a5fa"/>
  <text x="295" y="220" font-family="Arial" font-size="22" font-weight="700" fill="#1d4ed8">Claimed</text>

  <rect x="500" y="170" width="190" height="90" rx="18" fill="#ecfeff" stroke="#22d3ee"/>
  <text x="528" y="220" font-family="Arial" font-size="22" font-weight="700" fill="#0f766e">Lease Active</text>

  <rect x="760" y="170" width="170" height="90" rx="18" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="800" y="220" font-family="Arial" font-size="22" font-weight="700" fill="#92400e">Worker Stall</text>

  <rect x="990" y="170" width="180" height="90" rx="18" fill="#fee2e2" stroke="#ef4444"/>
  <text x="1012" y="220" font-family="Arial" font-size="22" font-weight="700" fill="#991b1b">Lease Expired</text>

  <rect x="1220" y="170" width="140" height="90" rx="18" fill="#dcfce7" stroke="#22c55e"/>
  <text x="1243" y="220" font-family="Arial" font-size="22" font-weight="700" fill="#166534">Takeover</text>

  <line x1="200" y1="215" x2="260" y2="215" stroke="#64748b" stroke-width="5"/>
  <line x1="430" y1="215" x2="500" y2="215" stroke="#64748b" stroke-width="5"/>
  <line x1="690" y1="215" x2="760" y2="215" stroke="#64748b" stroke-width="5"/>
  <line x1="930" y1="215" x2="990" y2="215" stroke="#64748b" stroke-width="5"/>
  <line x1="1170" y1="215" x2="1220" y2="215" stroke="#64748b" stroke-width="5"/>

  <rect x="470" y="315" width="500" height="55" rx="14" fill="#111827"/>
  <text x="500" y="350" font-family="Arial" font-size="20" fill="#f8fafc">
    stale commit attempts rejected at PostgreSQL fencing-token boundary
  </text>
</svg>
